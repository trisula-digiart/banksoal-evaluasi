<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Media | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans flex min-h-screen">

  <main class="flex-1 p-8 max-w-6xl mx-auto">
    <header class="mb-6 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Bank Media Aset Soal</h1>
        <p class="text-sm text-slate-500 mt-1">Daftar file gambar pendukung soal dari Google Drive Storage.</p>
      </div>
      <button onclick="loadMedia()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl text-sm transition-colors shadow-sm">
        🔄 Refresh Galeri
      </button>
    </header>

    <!-- GRID VIEW MEDIA GALLERY -->
    <section id="mediaGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <!-- Diisi otomatis via JS -->
      <div class="col-span-full text-center py-12 text-slate-400 text-sm">Klik refresh galeri untuk memuat aset gambar dari Drive.</div>
    </section>
  </main>

  <script src="auth-service.js"></script>
  <script>
    AUTH_SERVICE.checkSession(['ADMIN', 'GURU']);

    async function loadMedia() {
      const grid = document.getElementById('mediaGrid');
      grid.innerHTML = `<div class="col-span-full text-center py-12 text-indigo-600 font-medium animate-pulse text-sm">Menghubungi Google Drive API...</div>`;

      try {
        const res = await fetch(`${AUTH_SERVICE.GAS_API_URL}?action=getMediaList`);
        const result = await res.json();

        if (result.status === "SUCCESS" && result.data.length > 0) {
          grid.innerHTML = result.data.map(file => `
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <div class="w-full h-32 bg-slate-50 rounded-lg overflow-hidden flex items-center justify-center border border-slate-100 mb-3">
                ${file.thumbnail 
                  ? `<img src="data:image/png;base64,${file.thumbnail}" class="object-cover w-full h-full">`
                  : `<span class="text-xs text-slate-400">No Preview</span>`}
              </div>
              <div>
                <p class="text-xs font-bold text-slate-700 truncate" title="${file.name}">${file.name}</p>
                <a href="${file.url}" target="_blank" class="text-[10px] font-medium text-indigo-600 hover:underline mt-1 block">Buka File Asli 🔗</a>
              </div>
            </div>
          `).join('');
        } else {
          grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">Folder Google Drive kosong atau aset gambar tidak ditemukan.</div>`;
        }
      } catch (err) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-500 text-sm">Gagal memuat aset dari Drive API.</div>`;
      }
    }
  </script>
</body>
</html>
