<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Mengunci viewport perangkat mobile dari scaling bawaan browser (Anti-Zoom Lock) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Live Exam | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Firebase App & Realtime Database SDK (v9 Compat Mode) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    /* Mengunci zoom via CSS dan memastikan text-size tetap stabil di mobile */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: pan-y;
    }
    .no-zoom {
      touch-action: none;
    }
    .select-none { -webkit-user-select: none; user-select: none; }
    
    /* Menghentikan scroll bar bawaan browser pada navigasi nomor agar terlihat estetik */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="bg-slate-50 font-sans select-none h-screen flex flex-col overflow-hidden">

  <!-- ==========================================
       TOP HEADER (Timer & Ujian Info) - OPTIMIZED MOBILE SLIM
       ========================================== -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-20 px-4 sm:px-6 py-2.5 sm:py-4 flex justify-between items-center shadow-sm shrink-0">
    <div class="min-w-0 flex-1 pr-2">
      <h1 id="examTitle" class="text-xs sm:text-base lg:text-lg font-black text-slate-800 truncate leading-tight">Memuat info ujian...</h1>
      <p class="text-[10px] sm:text-xs text-slate-500 mt-0.5">Siswa: <span id="siswaName" class="font-bold text-indigo-600">-</span></p>
    </div>
    <div class="flex items-center gap-2 sm:gap-4 shrink-0">
      <!-- Timer Box Slim di Mobile -->
      <div class="bg-red-50 border border-red-100 px-2 sm:px-4 py-1.5 sm:py-2 rounded-xl flex items-center gap-1 sm:gap-2">
        <span class="text-red-500 animate-pulse text-sm sm:text-lg">⏱️</span>
        <span id="countdownTimer" class="font-mono text-sm sm:text-xl font-black text-red-600">00:00:00</span>
      </div>
      <!-- Tombol Akhiri Ujian Slim di Mobile -->
      <button onclick="confirmAkhiriUjian()" class="px-3 sm:px-5 py-2 sm:py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl text-[10px] sm:text-sm transition-all shadow-sm">
        Akhiri
      </button>
    </div>
  </header>

  <!-- ==========================================
       MAIN WORKSPACE - FIT TO SCREEN LAYOUT
       ========================================== -->
  <div class="flex-grow overflow-hidden max-w-[1400px] w-full mx-auto p-3 sm:p-4 lg:p-6 flex flex-col lg:flex-row gap-3 lg:gap-6 min-h-0">
    
    <!-- KIRI: NAVIGASI NOMOR SOAL (SLIM HORIZONTAL SWIPER DI HP / GRID DI DESKTOP) -->
    <aside class="bg-white p-3 lg:p-5 rounded-2xl shadow-sm border border-slate-200 lg:w-80 shrink-0 flex flex-col lg:h-full">
      <h3 class="hidden lg:block text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Navigasi Soal</h3>
      
      <!-- Container Nomor Soal (Otomatis Flex-Row Scrollable di HP, Grid 5 Kolom di Desktop) -->
      <div id="nomorGrid" class="flex overflow-x-auto lg:grid lg:grid-cols-5 gap-2 scrollbar-none whitespace-nowrap lg:whitespace-normal py-1 lg:py-0 shrink-0">
        <!-- Generasi dinamis via JS -->
      </div>

      <!-- Keterangan Warna Status (Hanya Muncul di Desktop untuk Menghemat Ruang Vertikal HP) -->
      <div class="hidden lg:block border-t border-slate-100 pt-4 mt-auto space-y-2 text-xs text-slate-500">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-emerald-500 rounded-md"></span> <span>Sudah Dijawab</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-amber-500 rounded-md"></span> <span>Ragu-Ragu</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-indigo-600 rounded-md"></span> <span>Sedang Dibuka</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-slate-200 rounded-md"></span> <span>Belum Dijawab</span>
        </div>
      </div>
    </aside>

    <!-- KANAN: KONTEN SOAL & RADIO OPSI (RESPONSIVE INNER SCROLL) -->
    <main class="flex-grow flex flex-col min-h-0">
      <div class="bg-white p-4 sm:p-6 lg:p-8 rounded-2xl shadow-sm border border-slate-200 flex-grow flex flex-col justify-between overflow-hidden">
        
        <!-- Scroller Area untuk Pertanyaan dan Opsi Jawaban -->
        <div class="flex-grow overflow-y-auto pr-1 space-y-4">
          <!-- Badge Info Nomor Aktif -->
          <div class="inline-block px-3 py-1 bg-slate-100 text-slate-700 font-bold rounded-lg text-[10px] sm:text-xs">
            SOAL NOMOR <span id="currentNumberBadge">1</span>
          </div>

          <!-- Teks Pertanyaan -->
          <div id="questionText" class="text-sm sm:text-base text-slate-800 font-semibold leading-relaxed">
            Sedang memuat pertanyaan...
          </div>

          <!-- Opsi Jawaban Pilihan Ganda -->
          <div id="optionsContainer" class="space-y-2.5 sm:space-y-3">
            <!-- Generasi dinamis via JS -->
          </div>
        </div>

        <!-- Tombol Aksi Navigasi Bawah (Sticky & Fit di Bagian Bawah Layar HP) -->
        <div class="flex justify-between items-center border-t border-slate-100 pt-3 sm:pt-6 mt-4 shrink-0">
          <button id="btnPrev" onclick="navigateQuestion(-1)" class="px-4 sm:px-5 py-2 sm:py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl text-xs sm:text-sm transition-all disabled:opacity-50">
            ⬅️ Sblmnya
          </button>
          
          <button id="btnRagu" onclick="toggleRaguRagu()" class="px-4 sm:px-5 py-2 sm:py-2.5 bg-amber-50 border border-amber-200 text-amber-700 font-bold rounded-xl text-xs sm:text-sm transition-all flex items-center gap-1.5 select-none">
            <input type="checkbox" id="chkRagu" class="rounded text-amber-600 focus:ring-amber-500 pointer-events-none w-3.5 h-3.5 sm:w-4 sm:h-4"> Ragu
          </button>
          
          <button id="btnNext" onclick="navigateQuestion(1)" class="px-4 sm:px-5 py-2 sm:py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-xs sm:text-sm transition-all">
            Selanjutnya ➡️
          </button>
        </div>

      </div>
    </main>
  </div>

  <script src="auth-service.js"></script>
  <script>
    // Gerbang Keamanan Session Siswa
    const session = AUTH_SERVICE.checkSession(['SISWA']);
    const urlParams = new URLSearchParams(window.location.search);
    const idUjian = urlParams.get('id_ujian') || "EXAM-DEMO";
    
    if (session) {
      session.uid = session.uid || session.username;
      document.getElementById('siswaName').innerText = session.nama || session.username;
    }

    // Koneksi Database Realtime Firebase
    const firebaseConfig = {
      databaseURL: "https://banksoalonline-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let listSoal = {};
    let jawabanTerpilih = {};
    let currentIndex = 1;
    let totalSoal = 0;
    let timerInterval = null;
    let sisaWaktuDetik = 0;

    // Proteksi Blokir Zooming Tambahan di Mobile Safari/Chrome via Event Listener
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    // ==========================================
    // INITIALIZE LIVE EXAM ENGINE (ASLI)
    // ==========================================
    async function initLiveExamEngine() {
      if (!session || !session.uid) {
        alert("Sesi identitas tidak valid. Silakan login ulang!");
        AUTH_SERVICE.logout();
        return;
      }

      db.ref(`active_packages/${idUjian}`).once('value', async (snapshot) => {
        try {
          const dataPaket = snapshot.val();
          if (!dataPaket) {
            alert("Akses Ujian Ditolak! Paket ujian tidak ditemukan atau belum aktif.");
            window.location.href = "login.html";
            return;
          }

          if (!dataPaket.list_soal) {
            alert("Node 'list_soal' tidak ditemukan di paket ujian Firebase ini.");
            document.getElementById('questionText').innerText = "Gagal memuat soal. Hubungi admin sekolah.";
            return;
          }

          document.getElementById('examTitle').innerText = dataPaket.konfigurasi.nama_paket;
          
          const rawSoal = dataPaket.list_soal;
          listSoal = {};
          
          if (Array.isArray(rawSoal)) {
            const cleanArray = rawSoal.filter(item => item !== null && item !== undefined);
            cleanArray.forEach((soal, idx) => {
              listSoal[idx + 1] = {
                id_soal: soal.id_soal,
                soal: soal.soal || soal.konten_soal,
                a: soal.a || soal.opsi_a,
                b: soal.b || soal.opsi_b,
                c: soal.c || soal.opsi_c,
                d: soal.d || soal.opsi_d
              };
            });
          } else {
            let currentNum = 1;
            Object.keys(rawSoal).forEach(key => {
              if (rawSoal[key]) {
                const soal = rawSoal[key];
                listSoal[currentNum] = {
                  id_soal: soal.id_soal,
                  soal: soal.soal || soal.konten_soal,
                  a: soal.a || soal.opsi_a,
                  b: soal.b || soal.opsi_b,
                  c: soal.c || soal.opsi_c,
                  d: soal.d || soal.opsi_d
                };
                currentNum++;
              }
            });
          }
          
          totalSoal = Object.keys(listSoal).length;

          // Ambil status progress live pengerjaan kuis
          db.ref(`live_exams/${idUjian}/${session.uid}`).once('value', (liveSnapshot) => {
            try {
              const liveData = liveSnapshot.val();

              if (liveData) {
                jawabanTerpilih = liveData.jawaban_terpilih || {};
                sisaWaktuDetik = (typeof liveData.sisa_waktu_detik !== 'undefined') ? liveData.sisa_waktu_detik : (dataPaket.konfigurasi.durasi * 60);
                
                if (liveData.status_pengerjaan === "SUBMITTED") {
                  alert("Ujian ini sudah selesai dikerjakan, bro!");
                  window.location.href = `siswa-finish.html?id_ujian=${idUjian}`;
                  return;
                }

                buildNomorGrid();
                showQuestion(currentIndex);
                startTimerEngine();
              } else {
                sisaWaktuDetik = dataPaket.konfigurasi.durasi * 60;
                
                db.ref(`live_exams/${idUjian}/${session.uid}`).set({
                  status_pengerjaan: "PROGRESS",
                  sisa_waktu_detik: sisaWaktuDetik,
                  jawaban_terpilih: {}
                }).then(() => {
                  buildNomorGrid();
                  showQuestion(currentIndex);
                  startTimerEngine();
                }).catch((setErr) => {
                  console.error("Gagal inisialisasi folder siswa:", setErr);
                  alert("Gagal mengamankan kursi ujian di database. Coba muat ulang halaman.");
                });
              }

            } catch (innerErr) {
              console.error("Crash Riwayat Ujian:", innerErr);
              document.getElementById('questionText').innerText = "Terjadi kegagalan parsing status lembar jawaban.";
            }
          });

        } catch (outerErr) {
          console.error("Crash Parser Master Paket:", outerErr);
          alert("Gagal membaca struktur paket ujian: " + outerErr.message);
        }
      });
    }

    // ==========================================
    // TIMER ENGINE (ASLI)
    // ==========================================
    function startTimerEngine() {
      if (sisaWaktuDetik <= 0) {
        autoSubmitUjian();
        return;
      }

      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        if (sisaWaktuDetik <= 0) {
          clearInterval(timerInterval);
          alert("Waktu habis! Jawaban kamu otomatis dikirim.");
          autoSubmitUjian();
          return;
        }

        sisaWaktuDetik--;
        
        const jam = Math.floor(sisaWaktuDetik / 3600).toString().padStart(2, '0');
        const menit = Math.floor((sisaWaktuDetik % 3600) / 60).toString().padStart(2, '0');
        const detik = (sisaWaktuDetik % 60).toString().padStart(2, '0');
        document.getElementById('countdownTimer').innerText = `${jam}:${menit}:${detik}`;

        if (sisaWaktuDetik % 5 === 0) {
          db.ref(`live_exams/${idUjian}/${session.uid}`).update({
            sisa_waktu_detik: sisaWaktuDetik
          });
        }
      }, 1000);
    }

    // ==========================================
    // RENDER NOMOR GRID (OPTIMIZED RESPONSIVE)
    // ==========================================
    function buildNomorGrid() {
      const container = document.getElementById('nomorGrid');
      container.innerHTML = "";

      for (let i = 1; i <= totalSoal; i++) {
        const itemState = jawabanTerpilih[i];
        let bgClass = "bg-slate-200 text-slate-700 hover:bg-slate-300";

        if (itemState) {
          if (itemState.status_ragu) {
            bgClass = "bg-amber-500 text-white";
          } else if (itemState.jawaban && itemState.jawaban !== "") {
            bgClass = "bg-emerald-500 text-white";
          }
        }

        if (i === currentIndex) {
          bgClass = "bg-indigo-600 text-white ring-4 ring-indigo-100";
        }

        // min-w-[44px] shrink-0 menjamin tombol navigasi tidak gepeng di mobile swiper
        container.innerHTML += `
          <button id="numBtn-${i}" onclick="jumpToQuestion(${i})" class="min-w-[44px] shrink-0 lg:min-w-0 h-10 lg:h-11 font-black rounded-xl text-center text-sm transition-all shadow-sm ${bgClass}">
            ${i}
          </button>
        `;
      }

      // Auto Scroll ke tombol aktif pada versi mobile agar user nyaman
      const activeBtn = document.getElementById(`numBtn-${currentIndex}`);
      if (activeBtn && window.innerWidth < 1024) {
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }

    // ==========================================
    // RENDER KONTEN PERTANYAAN (OPTIMIZED FONTS)
    // ==========================================
    function showQuestion(index) {
      if (index < 1 || index > totalSoal) return;
      currentIndex = index;
      const soal = listSoal[index];
      const containerOpsi = document.getElementById('optionsContainer');
      
      document.getElementById('currentNumberBadge').innerText = index;

      if (!soal || !soal.soal) {
        document.getElementById('questionText').innerText = "Soal pada nomor ini kosong atau tidak terformat.";
        containerOpsi.innerHTML = `<div class="p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl text-xs font-semibold">Tidak ada pilihan jawaban yang tersedia untuk soal yang kosong.</div>`;
        buildNomorGrid();
        return;
      }
 
      document.getElementById('questionText').innerText = soal.soal;

      const currentAns = jawabanTerpilih[index] ? jawabanTerpilih[index].jawaban : "";
      const isRagu = jawabanTerpilih[index] ? jawabanTerpilih[index].status_ragu : false;

      document.getElementById('chkRagu').checked = isRagu;

      const keys = ['a', 'b', 'c', 'd'];
      containerOpsi.innerHTML = keys.map(key => {
        const opsiTeks = soal[key] || "-";
        const isChecked = currentAns === key.toUpperCase();
        return `
          <label onclick="selectJawaban('${key.toUpperCase()}')" class="flex items-center gap-3 p-3 bg-white border ${isChecked ? 'border-indigo-500 bg-indigo-50/20' : 'border-slate-200 hover:bg-slate-50'} rounded-xl cursor-pointer transition-all">
            <input type="radio" name="opsiSoal" value="${key.toUpperCase()}" ${isChecked ? 'checked' : ''} class="w-4 h-4 text-indigo-600 border-slate-300 focus:ring-indigo-500 shrink-0">
            <span class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500 uppercase shrink-0">${key}</span>
            <span class="text-slate-700 text-xs sm:text-sm font-medium leading-tight">${opsiTeks}</span>
          </label>
        `;
      }).join('');

      document.getElementById('btnPrev').disabled = (index === 1);
      document.getElementById('btnNext').innerText = (index === totalSoal) ? "Selesai 🏁" : "Selanjutnya ➡️";
      
      buildNomorGrid();
    }

    // ==========================================
    // ACTION CONTROLLERS (ASLI)
    // ==========================================
    function selectJawaban(hurufOpsi) {
      if (!jawabanTerpilih[currentIndex]) {
        jawabanTerpilih[currentIndex] = { jawaban: "", status_ragu: false };
      }

      jawabanTerpilih[currentIndex].jawaban = hurufOpsi;

      db.ref(`live_exams/${idUjian}/${session.uid}/jawaban_terpilih/${currentIndex}`).update({
        jawaban: hurufOpsi
      });

      showQuestion(currentIndex);
    }

    function toggleRaguRagu() {
      if (!jawabanTerpilih[currentIndex]) {
        jawabanTerpilih[currentIndex] = { jawaban: "", status_ragu: false };
      }

      const stateSekarang = !jawabanTerpilih[currentIndex].status_ragu;
      jawabanTerpilih[currentIndex].status_ragu = stateSekarang;

      db.ref(`live_exams/${idUjian}/${session.uid}/jawaban_terpilih/${currentIndex}`).update({
        status_ragu: stateSekarang
      });

      showQuestion(currentIndex);
    }

    function navigateQuestion(step) {
      const target = currentIndex + step;
      if (target >= 1 && target <= totalSoal) {
        showQuestion(target);
      } else if (target > totalSoal) {
        confirmAkhiriUjian();
      }
    }

    function jumpToQuestion(num) {
      showQuestion(num);
    }

    function confirmAkhiriUjian() {
      const konfirmasi = confirm("Apakah kamu yakin ingin mengakhiri ujian ini, bro? Pastikan semua nomor sudah terisi!");
      if (konfirmasi) {
        autoSubmitUjian();
      }
    }

    function autoSubmitUjian() {
      if(timerInterval) clearInterval(timerInterval);
      db.ref(`live_exams/${idUjian}/${session.uid}`).update({
        status_pengerjaan: "SUBMITTED"
      }).then(() => {
        window.location.href = `siswa-finish.html?id_ujian=${idUjian}`;
      });
    }

    window.onload = initLiveExamEngine;
  </script>
</body>
</html>
