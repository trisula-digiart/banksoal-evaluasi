<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Paket Ujian | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans flex min-h-screen">

  <main class="flex-1 p-8 max-w-5xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <a href="dashboard.html" class="text-slate-400 hover:text-slate-600 text-lg">⬅️</a>
      <h1 class="text-2xl font-bold text-slate-800">Buat Paket Ujian Baru</h1>
    </div>

    <form id="paketForm" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- KIRI: Identitas & Waktu -->
      <div class="lg:col-span-2 space-y-5">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-4">
          <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider border-b border-slate-50 pb-2">Identitas Ujian</h3>
          
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Nama Paket / Ujian</label>
            <input type="text" id="nama_paket" required placeholder="Contoh: Ujian Harian Aljabar Bab 2" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- PATCH: Mengubah Input Mapel Menjadi Dropdown Baku -->
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Mata Pelajaran</label>
              <select id="mapel" required onchange="handleMapelSelectionChange()" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                <option value="">-- Pilih Mata Pelajaran --</option>
                <option value="BAHASA INDONESIA">BAHASA INDONESIA</option>
                <option value="MATEMATIKA">MATEMATIKA</option>
                <option value="IPAS">IPAS</option>
                <option value="PENDIDIKAN PANCASILA">PENDIDIKAN PANCASILA</option>
                <option value="PENDIDIKAN AGAMA">PENDIDIKAN AGAMA</option>
                <option value="PJOK">PJOK</option>
                <option value="SENI BUDAYA">SENI BUDAYA</option>
                <option value="BAHASA INGGRIS">BAHASA INGGRIS</option>
                <option value="MUATAN LOKAL">MUATAN LOKAL</option>
                <option value="__CUSTOM__" class="text-indigo-600 font-bold">+ TAMBAH MAPEL BARU (MANUAL)</option>
              </select>
            </div>
            
            <!-- PATCH: Mengubah Input Kelas Menjadi Dropdown Baku Angka 1-6 -->
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Target Kelas</label>
              <select id="kelas" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                <option value="">-- Pilih Kelas --</option>
                <option value="1">Kelas 1</option>
                <option value="2">Kelas 2</option>
                <option value="3">Kelas 3</option>
                <option value="4">Kelas 4</option>
                <option value="5">Kelas 5</option>
                <option value="6">Kelas 6</option>
              </select>
            </div>
          </div>

          <!-- PATCH DYNAMIC TOGGLE BLOCK: Input Text Baru Kustom Mapel (Hidden Secara Default) -->
          <div id="customMapelBlock" class="hidden p-4 bg-indigo-50/50 rounded-xl border border-indigo-100/50 transition-all">
            <label class="block mb-2 text-sm font-medium text-indigo-900">Tulis Nama Mata Pelajaran Baru</label>
            <input type="text" id="mapel_kustom" placeholder="Masukkan nama mata pelajaran baru kustom" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
            <span class="text-xs text-indigo-500 mt-1 block">* Pastikan penulisan ejaan benar agar singkron dengan sistem.</span>
          </div>

        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-4">
          <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider border-b border-slate-50 pb-2">Durasi & Jadwal</h3>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Durasi (Menit)</label>
              <input type="number" id="durasi" required min="10" value="90" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Jumlah Soal</label>
              <input type="number" id="jumlah_soal" required min="1" value="10" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Waktu Mulai Akses</label>
              <input type="datetime-local" id="waktu_mulai" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">Waktu Selesai Akses</label>
              <input type="datetime-local" id="waktu_selesai" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>
        </div>
      </div>

      <!-- KANAN: Fitur Acak & Publish Status -->
      <div class="space-y-5">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-4">
          <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider border-b border-slate-50 pb-2">Pengaturan Engine</h3>
          
          <div class="flex items-center justify-between">
            <div>
              <label class="text-sm font-medium text-slate-700 block">Acak Nomor Soal</label>
              <span class="text-xs text-slate-400">Urutan soal siswa berbeda-beda</span>
            </div>
            <input type="checkbox" id="acak_soal" checked class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
          </div>

          <div class="flex items-center justify-between">
            <div>
              <label class="text-sm font-medium text-slate-700 block">Acak Pilihan Opsi</label>
              <span class="text-xs text-slate-400">Pilihan A, B, C, D akan diacak</span>
            </div>
            <input type="checkbox" id="acak_opsi" checked class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
          </div>

          <div class="flex items-center justify-between">
            <div>
              <label class="text-sm font-medium text-slate-700 block">Tampilkan Nilai Instan</label>
              <span class="text-xs text-slate-400">Siswa langsung lihat nilai saat selesai</span>
            </div>
            <input type="checkbox" id="tampilkan_nilai" checked class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-4">
          <label class="block text-sm font-medium text-slate-700">Status Publikasi</label>
          <select id="status" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="OPEN" class="text-emerald-600 font-bold">🟢 OPEN (Rilis ke Firebase Live)</option>
            <option value="DRAFT" class="text-slate-500">⚪ DRAFT (Simpan di Sheets Saja)</option>
          </select>

          <button type="submit" id="btnSimpanPaket"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-indigo-100 text-center block">
            Simpan & Rilis Paket Live
          </button>
        </div>
      </div>
    </form>
  </main>

  <script src="auth-service.js"></script>
  <script>
    AUTH_SERVICE.checkSession(['ADMIN', 'GURU']);

    // PATCH VISUAL INTERCEPTOR: Menampilkan/menyembunyikan input kustom mapel secara real-time
    function handleMapelSelectionChange() {
      const mapelSelect = document.getElementById('mapel');
      const customBlock = document.getElementById('customMapelBlock');
      const customInput = document.getElementById('mapel_kustom');

      if (mapelSelect.value === '__CUSTOM__') {
        customBlock.classList.remove('hidden');
        customInput.required = true;
        customInput.focus();
      } else {
        customBlock.classList.add('hidden');
        customInput.required = false;
        customInput.value = "";
      }
    }

    document.getElementById('paketForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btnSimpanPaket');
      btn.disabled = true;
      btn.innerText = "Memproses Sinkronisasi Data...";

      try {
        const namaPaketEl = document.getElementById('nama_paket');
        const mapelSelectEl = document.getElementById('mapel');
        const customMapelInputEl = document.getElementById('mapel_kustom');
        const kelasSelectEl = document.getElementById('kelas');
        const durasiEl = document.getElementById('durasi');
        const jumlahSoalEl = document.getElementById('jumlah_soal');
        const waktuMulaiEl = document.getElementById('waktu_mulai');
        const waktuSelesaiEl = document.getElementById('waktu_selesai');
        const acakSoalEl = document.getElementById('acak_soal');
        const acakOpsiEl = document.getElementById('acak_opsi');
        const tampilkanNilaiEl = document.getElementById('tampilkan_nilai');
        const statusEl = document.getElementById('status');

        if (!namaPaketEl || !mapelSelectEl || !kelasSelectEl || !durasiEl || !jumlahSoalEl || !waktuMulaiEl || !waktuSelesaiEl) {
          throw new Error("Struktur elemen input HTML tidak valid!");
        }

        // PATCH INTEGRATION LOGIC: Ekstrak nilai mapel terpilih (gunakan input kustom jika memilih opsi custom)
        let finalMapelValue = mapelSelectEl.value.trim();
        if (finalMapelValue === '__CUSTOM__') {
          finalMapelValue = customMapelInputEl.value.trim();
        }

        if (!finalMapelValue) {
          throw new Error("Silakan pilih atau isi nama mata pelajaran terlebih dahulu!");
        }

        const payload = {
          action: "createPaketUjian",
          payload: {
            nama_paket: namaPaketEl.value.trim(),
            mapel: finalMapelValue.toUpperCase(), // Tetap dipaksa UPPERCASE agar sinkronisasi filter database presisi
            kelas: kelasSelectEl.value.trim(),     // Mengirim string angka murni "1" - "6"
            durasi: parseInt(durasiEl.value) || 0,
            jumlah_soal: parseInt(jumlahSoalEl.value) || 0,
            waktu_mulai: waktuMulaiEl.value,
            waktu_selesai: waktuSelesaiEl.value,
            acak_soal: acakSoalEl ? acakSoalEl.checked : true,
            acak_opsi: acakOpsiEl ? acakOpsiEl.checked : true,
            tampilkan_nilai: tampilkanNilaiEl ? tampilkanNilaiEl.checked : true,
            status: statusEl.value
          }
        };

        const res = await fetch(AUTH_SERVICE.GAS_API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        
        const result = await res.json();

        if (result.status === "SUCCESS") {
  alert(result.data.message);
  window.location.href = "index.html"; // <-- BENAR: Diarahkan kembali ke dashboard utama
}
        } else {
          alert("Gagal Dari Backend: " + result.error);
          btn.disabled = false;
          btn.innerText = "Simpan & Rilis Paket Live";
        }
      } catch(err) {
        alert("CRITICAL ERROR: " + err.message);
        console.error(err);
        btn.disabled = false;
        btn.innerText = "Simpan & Rilis Paket Live";
      }
    });
  </script>
</body>
</html>
