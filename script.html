<script>
  // Global state untuk menyimpan data soal yang valid dan siap kirim
  let parsedItems = [];

  // DOM Elements
  const fileInput = document.getElementById('excelFileInput');
  const btnSyncData = document.getElementById('btnSyncData');
  const btnText = document.getElementById('btnText');
  const btnSpinner = document.getElementById('btnSpinner');
  const alertContainer = document.getElementById('alertContainer');
  const previewCard = document.getElementById('previewCard');
  const previewTableBody = document.getElementById('previewTableBody');
  const totalRowsBadge = document.getElementById('totalRowsBadge');

  // Ganti dengan URL Web App Google Apps Script Anda setelah di-deploy
  const GAS_WEB_APP_URL = 'TULIS_URL_WEB_APP_GAS_ANDA_DISINI';

  // Event Listener: Mendeteksi unggahan file Excel
  fileInput.addEventListener('change', handleFileSelect);

  // Event Listener: Tombol Kirim Data Massal
  btnSyncData.addEventListener('click', submitBulkData);

  /**
   * Handler saat file Excel dipilih oleh pengguna
   */
  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    showAlert('info', 'Sedang membaca dan memvalidasi file Excel...');
    
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        
        // Ambil sheet pertama di dalam file Excel
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        
        // Konversi sheet menjadi Array of Objects (Baris 1 otomatis jadi properti/header)
        const jsonData = XLSX.utils.sheet_to_json(worksheet);
        
        if (jsonData.length === 0) {
          throw new Error("File Excel kosong atau tidak mengikuti format header yang ditentukan.");
        }

        // Jalankan proses validasi dan mapping data
        processAndValidateData(jsonData);

      } catch (error) {
        showAlert('danger', 'Gagal memproses Excel: ' + error.message);
        resetPreview();
      }
    };
    reader.readAsArrayBuffer(file);
  }

  /**
   * Memvalidasi aturan bisnis skema soal sebelum di-render ke UI
   */
  function processAndValidateData(data) {
    parsedItems = [];
    previewTableBody.innerHTML = '';

    for (let i = 0; i < data.length; i++) {
      const row = data[i];
      const rowNum = i + 2; // Baris Excel asli (Header = baris 1)

      // Ambil data dan bersihkan spasi
      const mataPelajaran = row['Mata Pelajaran'] ? String(row['Mata Pelajaran']).trim() : '';
      const kelas = row['Kelas'] ? String(row['Kelas']).trim() : '';
      const tipeSoal = row['Tipe Soal'] ? String(row['Tipe Soal']).trim() : '';
      const pertanyaan = row['Pertanyaan'] ? String(row['Pertanyaan']).trim() : '';
      const opsiA = row['Opsi A'] ? String(row['Opsi A']).trim() : '';
      const opsiB = row['Opsi B'] ? String(row['Opsi B']).trim() : '';
      const opsiC = row['Opsi C'] ? String(row['Opsi C']).trim() : '';
      const opsiD = row['Opsi D'] ? String(row['Opsi D']).trim() : '';
      const opsiE = row['Oply E'] || row['Opsi E'] ? String(row['Oply E'] || row['Opsi E']).trim() : '';
      const kunciJawaban = row['Kunci Jawaban'] ? String(row['Kunci Jawaban']).trim().toUpperCase() : '';

      // Validasi Standard Required
      if (!tipeSoal || (tipeSoal !== 'PG' && tipeSoal !== 'Essay')) {
        throw new Error(`Baris ${rowNum}: Kolom 'Tipe Soal' wajib diisi dengan 'PG' atau 'Essay'.`);
      }
      if (!pertanyaan) {
        throw new Error(`Baris ${rowNum}: Kolom 'Pertanyaan' tidak boleh kosong.`);
      }

      // Validasi Khusus Pilihan Ganda (PG)
      if (tipeSoal === 'PG') {
        if (!opsiA || !opsiB || !opsiC || !opsiD) {
          throw new Error(`Baris ${rowNum}: Soal PG minimal wajib mengisi Opsi A sampai Opsi D.`);
        }
        if (!kunciJawaban) {
          throw new Error(`Baris ${rowNum}: Soal PG wajib menyertakan 'Kunci Jawaban'.`);
        }
      }

      // Simpan objek data bersih ke dalam state global
      const itemObject = {
        mata_pelajaran: mataPelajaran,
        kelas: kelas,
        tipe_soal: tipeSoal,
        pertanyaan: pertanyaan,
        opsi_a: opsiA,
        opsi_b: opsiB,
        opsi_c: opsiC,
        opsi_d: opsiD,
        opsi_e: opsiE,
        kunci_jawaban: kunciJawaban
      };
      
      parsedItems.push(itemObject);

      // Render Baris ke Preview Tabel UI
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${escapeHtml(mataPelajaran)}</td>
        <td><span class="badge bg-light text-dark border">${escapeHtml(kelas)}</span></td>
        <td><span class="badge ${tipeSoal === 'PG' ? 'bg-info text-dark' : 'bg-warning text-dark'}">${tipeSoal}</span></td>
        <td class="text-wrap" style="min-width: 250px;">${escapeHtml(pertanyaan)}</td>
        <td>${escapeHtml(opsiA)}</td>
        <td>${escapeHtml(opsiB)}</td>
        <td>${escapeHtml(opsiC)}</td>
        <td>${escapeHtml(opsiD)}</td>
        <td>${escapeHtml(opsiE)}</td>
        <td class="fw-bold text-center text-primary">${escapeHtml(kunciJawaban)}</td>
      `;
      previewTableBody.appendChild(tr);
    }

    // Aktifkan UI Preview dan Tombol Kirim jika validasi berhasil total
    totalRowsBadge.innerText = `${parsedItems.length} baris terdeteksi`;
    previewCard.classList.remove('d-none');
    btnSyncData.removeAttribute('disabled');
    showAlert('success', `Validasi Client Berhasil! ${parsedItems.length} soal siap disinkronisasikan.`);
  }

  /**
   * Mengirim data massal ke Google Apps Script Web App Endpoint via Fetch API
   */
  function submitBulkData() {
    if (parsedItems.length === 0) return;
    if (GAS_WEB_APP_URL === 'TULIS_URL_WEB_APP_GAS_ANDA_DISINI') {
      showAlert('danger', 'Gagal mengirim! Anda belum mengonfigurasi variabel GAS_WEB_APP_URL di file script.html.');
      return;
    }

    // Set UI Loading State
    setLoadingState(true);
    showAlert('info', 'Sedang melakukan Bulk Insert ke database Google Sheets... Mohon tunggu.');

    // Bungkus payload sesuai cetak biru JSON
    const payload = {
      items: parsedItems
    };

    // Jalankan request ke GAS via metode POST dengan mode no-cors/cors teratur
    fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8' // Diperlukan agar GAS tidak memicu pre-flight request CORS berlebih
      },
      body: JSON.stringify(payload)
    })
    .then(response => {
      if (!response.ok) throw new Error('Jaringan bermasalah atau URL Web App salah.');
      return response.json();
    })
    .then(result => {
      if (result.success) {
        showAlert('success', `🎉 Mantap! ${result.data.inserted} data soal berhasil disuntikkan ke Google Sheets.`);
        resetPreview();
        fileInput.value = '';
      } else {
        showAlert('danger', 'Gagal diproses Server: ' + result.message);
      }
    })
    .catch(error => {
      showAlert('danger', 'Error Koneksi Integrasi: ' + error.message);
    })
    .finally(() => {
      setLoadingState(false);
    });
  }

  // --- Helper Functions ---

  function setLoadingState(isLoading) {
    if (isLoading) {
      btnSyncData.setAttribute('disabled', 'true');
      btnSpinner.classList.remove('d-none');
      btnText.innerText = 'Menyimpan Data...';
    } else {
      btnSpinner.classList.add('d-none');
      btnText.innerText = 'Kirim ke Database';
    }
  }

  function showAlert(type, message) {
    alertContainer.className = `alert alert-${type} shadow-sm`;
    alertContainer.innerText = message;
    alertContainer.classList.remove('d-none');
  }

  function resetPreview() {
    parsedItems = [];
    btnSyncData.setAttribute('disabled', 'true');
    previewCard.classList.add('d-none');
    previewTableBody.innerHTML = '';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }
</script>
