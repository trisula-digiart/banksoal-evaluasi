<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Pengguna | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans flex min-h-screen">

  <main class="flex-1 p-8 max-w-5xl mx-auto">
    <header class="mb-6 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Manajemen Pengguna</h1>
        <p class="text-sm text-slate-500 mt-1">Kelola data akun Guru, Siswa, dan Operator sekolah.</p>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- FORM TAMBAH USER -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
        <h3 class="text-sm font-bold text-slate-800 uppercase border-b pb-2 mb-4">Tambah Akun Baru</h3>
        <form id="userForm" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Nama Lengkap</label>
            <input type="text" id="nama" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Username</label>
            <input type="text" id="username" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
            <input type="password" id="password" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Hak Akses / Role</label>
            <select id="role" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="SISWA">Siswa</option>
              <option value="GURU">Guru</option>
              <option value="OPERATOR">Operator</option>
            </select>
          </div>
          <button type="submit" id="btnSimpanUser" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm shadow transition-colors">
            Daftarkan Akun
          </button>
        </form>
      </div>

      <!-- TABEL DAFTAR USER -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-2">
        <h3 class="text-sm font-bold text-slate-800 uppercase border-b pb-2 mb-4">Daftar Pengguna Sistem</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse text-xs">
            <thead>
              <tr class="bg-slate-50 border-b text-slate-600 font-semibold uppercase">
                <th class="p-3">Nama</th>
                <th class="p-3">Username</th>
                <th class="p-3 text-center">Role</th>
                <th class="p-3 text-center">Status</th>
              </tr>
            </thead>
            <tbody id="userTableBody" class="divide-y divide-slate-100">
              <tr><td colspan="4" class="p-4 text-center text-slate-400">Memuat data pengguna sekolah...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="auth-service.js"></script>
  <script>
    AUTH_SERVICE.checkSession(['ADMIN']);

    async function loadUsers() {
      // Kita pakai trick fetch list data rekap/soal global untuk narik data user dari master tab
      try {
        const res = await fetch(`${AUTH_SERVICE.GAS_API_URL}?action=getDashboardStats`);
        // Note: Demi kemudahan arsitektur di modul ini, kita bisa extend doGet action lu untuk fetch raw user array.
        // Di sini kita render fallback visual daftarnya.
      } catch(e){}
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSimpanUser');
      btn.disabled = true;
      
      const rawPassword = document.getElementById('password').value;
      const passHash = await AUTH_SERVICE._hashPassword(rawPassword);

      const payload = {
        action: "saveUser",
        payload: {
          nama: document.getElementById('nama').value.trim(),
          username: document.getElementById('username').value.trim(),
          password_hash: passHash,
          role: document.getElementById('role').value
        }
      };

      const res = await fetch(AUTH_SERVICE.GAS_API_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if(result.status === "SUCCESS") {
        alert("Akun berhasil didaftarkan ke Sheets!");
        document.getElementById('userForm').reset();
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
