<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Firebase untuk mendeteksi paket aktif sebelum masuk -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-slate-100">
    <!-- Header Logo -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-600 text-white text-2xl font-bold mb-3">
        CBT
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Selamat Datang</h2>
      <p class="text-slate-500 text-sm mt-1">Silakan masuk untuk memulai ujian</p>
    </div>

    <!-- Switch Login Mode -->
    <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
      <button type="button" onclick="switchTab('SISWA')" id="tabSiswa" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-indigo-600 shadow-sm transition-all">
        Siswa
      </button>
      <button type="button" onclick="switchTab('STAFF')" id="tabStaff" class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-800 transition-all">
        Admin / Guru
      </button>
    </div>

    <!-- Alert Error Banner -->
    <div id="errorAlert" class="hidden mb-4 p-4 text-sm text-red-700 bg-red-50 rounded-lg border border-red-100 break-all" role="alert">
      <span class="font-medium">Waduh!</span> <span id="errorText"></span>
    </div>

    <!-- FORM 1: LOGIN SISWA (DINAMIS DROPDOWN) -->
    <!-- PATCH: Tambahkan autocomplete="off" global untuk mematikan intervensi cache browser -->
    <form id="studentForm" class="space-y-4" autocomplete="off">
      <div>
        <label class="block mb-1.5 text-sm font-medium text-slate-700">Nama Siswa</label>
        <input type="text" id="siswaNama" required placeholder="Masukkan nama lengkap kamu" autocomplete="off"
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all">
      </div>

      <div>
        <label class="block mb-1.5 text-sm font-medium text-slate-700">Kelas</label>
        <select id="siswaKelas" required onchange="filterMapelDropdown()" disabled
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all bg-white disabled:opacity-60 disabled:bg-slate-50">
          <option value="">Menghubungkan ke Firebase...</option>
          <option value="1">Kelas 1</option>
          <option value="2">Kelas 2</option>
          <option value="3">Kelas 3</option>
          <option value="4">Kelas 4</option>
          <option value="5">Kelas 5</option>
          <option value="6">Kelas 6</option>
        </select>
      </div>

      <div>
        <label class="block mb-1.5 text-sm font-medium text-slate-700">Mata Pelajaran Ujian Aktif</label>
        <select id="siswaMapel" required disabled
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all bg-white disabled:opacity-60 disabled:bg-slate-50">
          <option value="">-- Pilih Mapel Ujian --</option>
        </select>
      </div>

      <button type="submit" id="btnSubmitSiswa" disabled
        class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-100">
        <span>Mulai Ujian Sekarang 🚀</span>
      </button>
    </form>

    <!-- FORM 2: LOGIN STAFF -->
    <form id="staffForm" class="space-y-4 hidden" autocomplete="off">
      <div>
        <label class="block mb-1.5 text-sm font-medium text-slate-700">Username</label>
        <input type="text" id="username" autocomplete="off"
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all">
      </div>

      <div>
        <label class="block mb-1.5 text-sm font-medium text-slate-700">Password</label>
        <input type="password" id="password" autocomplete="off"
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all">
      </div>

      <button type="submit" id="btnSubmitStaff"
        class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-100">
        <span id="btnTextStaff">Masuk Aplikasi</span>
      </button>
    </form>
  </div>

  <script src="auth-service.js"></script>
  <script>
    const firebaseConfig = {
      databaseURL: "https://banksoalonline-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let masterPaketAktif = null;
    let currentMode = "SISWA";

    function switchTab(mode) {
      currentMode = mode;
      const tabSiswa = document.getElementById('tabSiswa');
      const tabStaff = document.getElementById('tabStaff');
      const studentForm = document.getElementById('studentForm');
      const staffForm = document.getElementById('staffForm');
      const alertEl = document.getElementById('errorAlert');

      alertEl.classList.add('hidden');

      if (mode === 'SISWA') {
        tabSiswa.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-indigo-600 shadow-sm transition-all";
        tabStaff.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-800 transition-all";
        studentForm.classList.remove('hidden');
        staffForm.classList.add('hidden');
      } else {
        tabStaff.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-indigo-600 shadow-sm transition-all";
        tabSiswa.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-800 transition-all";
        staffForm.classList.remove('hidden');
        studentForm.classList.add('hidden');
      }
    }

    async function loadActivePackagesFromFirebase() {
      const alertEl = document.getElementById('errorAlert');
      const alertText = document.getElementById('errorText');
      const kelasSelect = document.getElementById('siswaKelas');
      
      try {
        const snapshot = await db.ref('active_packages').once('value');
        masterPaketAktif = snapshot.val() || {};
        console.log("=== CORE DATA V8 BERHASIL DIUNDUH ===");
        
        // PENTING: Bersihkan value select ke default agar tidak terpicu autofill usang browser
        kelasSelect.selectedIndex = 0;
        kelasSelect.options[0].text = "-- Pilih Kelas --";
        kelasSelect.disabled = false;

        if (Object.keys(masterPaketAktif).length === 0) {
          alertText.innerText = "Belum ada paket ujian yang aktif di Firebase.";
          alertEl.classList.remove('hidden');
        }
      } catch (err) {
        console.error("Gagal mengambil paket:", err);
        alertText.innerText = "Gagal memuat data dari Firebase: " + err.message;
        alertEl.classList.remove('hidden');
      }
    }

    function filterMapelDropdown() {
      const kelasSelect = document.getElementById('siswaKelas');
      const kelasTerpilih = kelasSelect.value ? kelasSelect.value.trim() : "";
      const mapelSelect = document.getElementById('siswaMapel');
      const btnSubmit = document.getElementById('btnSubmitSiswa');

      mapelSelect.innerHTML = '<option value="">-- Pilih Mapel Ujian --</option>';
      mapelSelect.disabled = true;
      btnSubmit.disabled = true;

      // DEFENSIVE GUARD 1: Jika opsi default ter-klik atau nilai kosong, STOP total (Jangan lempar alert!)
      if (!kelasTerpilih || kelasTerpilih === "") {
        return;
      }

      // DEFENSIVE GUARD 2: Jika data Firebase belum siap unduh, kunci eksekusi
      if (masterPaketAktif === null || Object.keys(masterPaketAktif).length === 0) {
        return;
      }

      let foundAny = false;
      const cleanTargetKelas = String(kelasTerpilih).replace(/[^0-9]/g, "").trim();

      Object.keys(masterPaketAktif).forEach(idPaket => {
        const paket = masterPaketAktif[idPaket];
        if (paket && paket.konfigurasi) {
          const rawKelas = paket.konfigurasi.kelas || paket.konfigurasi.kelas_target || "";
          const dbMapel = paket.konfigurasi.mapel || paket.konfigurasi.mata_pelajaran || "Ujian";
          const namaPaket = paket.konfigurasi.nama_paket || "Paket Ujian";

          const cleanDbKelas = String(rawKelas).replace(/[^0-9]/g, "").trim();

          if (cleanDbKelas !== "" && cleanDbKelas === cleanTargetKelas) {
            const nameDisplay = `${namaPaket} (${String(dbMapel).toUpperCase()})`;
            mapelSelect.innerHTML += `<option value="${idPaket}">${nameDisplay}</option>`;
            foundAny = true;
          }
        }
      });

      if (foundAny) {
        mapelSelect.disabled = false;
        btnSubmit.disabled = false;
      } else {
        const teksOpsiTerpilih = kelasSelect.options[kelasSelect.selectedIndex].text;
        alert("VERSI BARU KODE: Tidak ada paket ujian aktif untuk " + teksOpsiTerpilih + " saat ini.");
      }
    }

    document.getElementById('studentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nama = document.getElementById('siswaNama').value.trim();
      const kelas = document.getElementById('siswaKelas').value;
      const idUjian = document.getElementById('siswaMapel').value;

      if (!nama || !kelas || !idUjian) return;

      AUTH_SERVICE.studentDirectLogin(nama, kelas);
      window.location.href = `siswa-exam.html?id_ujian=${idUjian}`;
    });

    document.getElementById('staffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userEl = document.getElementById('username');
      const passEl = document.getElementById('password');
      const btnEl = document.getElementById('btnSubmitStaff');
      const btnText = document.getElementById('btnTextStaff');
      const alertEl = document.getElementById('errorAlert');
      const alertText = document.getElementById('errorText');

      btnEl.disabled = true;
      btnText.innerText = "Memproses...";
      alertEl.classList.add('hidden');

      const res = await AUTH_SERVICE.login(userEl.value, passEl.value);

      if (res.success) {
        window.location.href = 'index.html';
      } else {
        alertText.innerText = res.message;
        alertEl.classList.remove('hidden');
        btnEl.disabled = false;
        btnText.innerText = "Masuk Aplikasi";
      }
    });

    window.onload = loadActivePackagesFromFirebase;
  </script>
</body>
</html>
