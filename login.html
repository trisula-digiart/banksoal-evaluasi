<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Mengunci viewport perangkat mobile dari scaling bawaan browser secara mutlak -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Login | TRISULA SMART EVALUATION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Firebase Resmi -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    /* Mengunci zoom via CSS dan memastikan text-size tetap stabil di mobile browser */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: pan-y;
    }
    .select-none { -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body class="bg-white text-slate-800 font-sans antialiased flex flex-col min-h-screen select-none">

  <!-- ==========================================
       WORKSPACE UTAMA: FULLSCREEN LAYOUT (EDGE-TO-EDGE)
       ========================================== -->
  <div class="flex-1 w-full grid grid-cols-1 lg:grid-cols-12 overflow-y-auto lg:overflow-hidden bg-white">
    
    <!-- BANNER ILUSTRASI (DI DESKTOP ADA DI KIRI FULL MENEMPEL MONITOR, DI HP ADA DI ATAS FULL KAYA GAMBAR 5) -->
    <div class="col-span-1 lg:col-span-7 w-full h-[320px] sm:h-[400px] lg:h-full bg-[#e8f1ff] lg:bg-gradient-to-b lg:from-blue-500 lg:to-indigo-600 bg-contain bg-no-repeat bg-center relative shrink-0" 
         style="background-image: url('bg-login.jpg');">
      <div class="absolute inset-0 bg-slate-950/5 lg:hidden"></div>
    </div>

    <!-- CARD FORM LOGIN UTAMA (100% SISI KANAN MONITOR DESKTOP) -->
    <div class="col-span-1 lg:col-span-5 w-full h-full p-6 sm:p-10 md:p-12 flex items-center justify-center bg-white border-t lg:border-t-0 lg:border-l border-slate-100">
      <div class="w-full max-w-sm mx-auto space-y-5">
        
        <!-- Header Teks Selamat Datang -->
        <div class="text-center">
          <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Selamat Datang!</h2>
          <p class="text-slate-500 text-xs md:text-sm mt-1">Silakan masuk untuk memulai ujian</p>
        </div>

        <!-- Switch Mode Tab: Siswa vs Admin/Guru -->
        <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200/50 shadow-inner">
          <button type="button" onclick="switchTab('SISWA')" id="tabSiswa" class="flex-1 py-2 text-xs md:text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm transition-all flex items-center justify-center gap-2">
            👤 Siswa
          </button>
          <button type="button" onclick="switchTab('STAFF')" id="tabStaff" class="flex-1 py-2 text-xs md:text-sm font-bold rounded-lg text-slate-500 hover:text-slate-800 transition-all flex items-center justify-center gap-2">
            🛡️ Admin / Guru
          </button>
        </div>

        <!-- Alert Banner Notifikasi Error -->
        <div id="errorAlert" class="hidden p-3 text-xs text-red-700 bg-red-50 rounded-xl border border-red-100 break-all shadow-sm" role="alert">
          <span class="font-bold">Waduh!</span> <span id="errorText"></span>
        </div>

        <!-- FORM 1: LOGIN SISWA (Font Ukuran Kecil Pas & Proporsional di Layar HP) -->
        <form id="studentForm" class="space-y-3.5" autocomplete="off">
          <div>
            <label class="block mb-1 text-[10px] md:text-xs font-bold text-slate-700 uppercase tracking-wider">Nama Siswa</label>
            <input type="text" id="siswaNama" required placeholder="Masukkan nama lengkap kamu" autocomplete="off"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 transition-all shadow-sm bg-slate-50/50">
          </div>

          <div>
            <label class="block mb-1 text-[10px] md:text-xs font-bold text-slate-700 uppercase tracking-wider">Kelas</label>
            <select id="siswaKelas" required onchange="filterMapelDropdown()" disabled
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 transition-all bg-slate-50/50 shadow-sm disabled:opacity-60">
              <option value="">Menghubungkan ke Firebase...</option>
              <option value="1">Kelas 1</option>
              <option value="2">Kelas 2</option>
              <option value="3">Kelas 3</option>
              <option value="4">Kelas 4</option>
              <option value="5">Kelas 5</option>
              <option value="6">Kelas 6</option>
            </select>
          </div>

          <div>
            <label class="block mb-1 text-[10px] md:text-xs font-bold text-slate-700 uppercase tracking-wider">Mata Pelajaran Ujian Aktif</label>
            <select id="siswaMapel" required disabled
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 transition-all bg-slate-50/50 shadow-sm disabled:opacity-60">
              <option value="">-- Pilih Mapel Ujian --</option>
            </select>
          </div>

          <div class="pt-1.5">
            <button type="submit" id="btnSubmitSiswa" disabled
              class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-100 text-xs md:text-sm uppercase tracking-wider">
              <span>Mulai Ujian Sekarang 🚀</span>
            </button>
          </div>
        </form>

        <!-- FORM 2: LOGIN STAFF / ADMIN -->
        <form id="staffForm" class="space-y-3.5 hidden" autocomplete="off">
          <div>
            <label class="block mb-1 text-[10px] md:text-xs font-bold text-slate-700 uppercase tracking-wider">Username</label>
            <input type="text" id="username" autocomplete="off" required placeholder="Masukkan username admin"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 transition-all shadow-sm bg-slate-50/50">
          </div>

          <div>
            <label class="block mb-1 text-[10px] md:text-xs font-bold text-slate-700 uppercase tracking-wider">Password</label>
            <input type="password" id="password" autocomplete="off" required placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 transition-all shadow-sm bg-slate-50/50">
          </div>

          <div class="pt-1.5">
            <button type="submit" id="btnSubmitStaff"
              class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-100 text-xs md:text-sm uppercase tracking-wider">
              <span id="btnTextStaff">Masuk Aplikasi Dashboard</span>
            </button>
          </div>
        </form>

        <!-- Banner Panduan Khas Mockup -->
        <div class="p-3 bg-amber-50 rounded-xl border border-amber-100 flex items-start gap-2 text-[10px] md:text-xs text-amber-800/95 shadow-sm">
          <span class="text-xs mt-0.5">💡</span>
          <div>
            <p class="font-bold text-amber-900 leading-tight">Pastikan kamu sudah siap sebelum memulai ujian.</p>
            <p class="text-amber-700/95 mt-0.5 leading-normal">Kerjakan dengan jujur dan semangat! 😊</p>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- ==========================================
       BOTTOM BAR: FULL WIDTH STICKY FOOTER
       ========================================== -->
  <footer class="bg-indigo-950 text-slate-400 text-center py-3 px-4 text-[9px] md:text-xs border-t border-indigo-900 flex flex-col sm:flex-row justify-between items-center gap-2 shrink-0 z-10">
    <div class="flex items-center gap-1.5">
      <span class="text-white font-bold">TRISULA SMART EVALUATION</span>
    </div>
    <div class="text-indigo-300">
      Aplikasi dibuat oleh <strong>Trisula Ai Framework by K2c Komputindo</strong>
    </div>
    <div class="flex items-center gap-3">
      <span>✔ Aman</span>
      <span>🔒 Terpercaya</span>
    </div>
  </footer>

  <script src="auth-service.js" defer></script>
  
  <script>
    const firebaseConfig = {
      databaseURL: "https://banksoalonline-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let masterPaketAktif = null;
    let currentMode = "SISWA";

    // KUNCI PINCH-TO-ZOOM PADA HANDPHONE SECARA ABSOLUT VIA SCRIPT INTERCEPTOR
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });
    document.addEventListener('touchmove', function (e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });

    function switchTab(mode) {
      currentMode = mode;
      const tabSiswa = document.getElementById('tabSiswa');
      const tabStaff = document.getElementById('tabStaff');
      const studentForm = document.getElementById('studentForm');
      const staffForm = document.getElementById('staffForm');
      const alertEl = document.getElementById('errorAlert');

      alertEl.classList.add('hidden');

      if (mode === 'SISWA') {
        tabSiswa.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm transition-all flex items-center justify-center gap-2";
        tabStaff.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-lg text-slate-500 hover:text-slate-800 transition-all flex items-center justify-center gap-2";
        studentForm.classList.remove('hidden');
        staffForm.classList.add('hidden');
      } else {
        tabStaff.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm transition-all flex items-center justify-center gap-2";
        tabSiswa.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-lg text-slate-500 hover:text-slate-800 transition-all flex items-center justify-center gap-2";
        staffForm.classList.remove('hidden');
        studentForm.classList.add('hidden');
      }
    }

    async function loadActivePackagesFromFirebase() {
      const kelasSelect = document.getElementById('siswaKelas');
      try {
        localStorage.removeItem("cbt_session");
        
        const snapshot = await db.ref('active_packages').once('value');
        masterPaketAktif = snapshot.val() || {};
        console.log("=== FIREBASE DATA SYNCED ===", masterPaketAktif);
        
        kelasSelect.options[0].text = "-- Pilih Kelas --";
        kelasSelect.value = "";
        kelasSelect.selectedIndex = 0;
        kelasSelect.disabled = false;
      } catch (err) {
        console.error("Firebase Fetch Error:", err);
      }
    }

    // FIX MUTLAK v16.7: Fail-Safe Dynamic Global Scan Engine (Anti Mismatch Selamanya)
    function filterMapelDropdown() {
      const kelasSelect = document.getElementById('siswaKelas');
      const kelasTerpilih = kelasSelect.value ? String(kelasSelect.value).trim() : "";
      const mapelSelect = document.getElementById('siswaMapel');
      const btnSubmit = document.getElementById('btnSubmitSiswa');
      const teksOpsiTerpilih = kelasSelect.options[kelasSelect.selectedIndex].text;

      mapelSelect.innerHTML = '<option value="">-- Pilih Mapel Ujian --</option>';
      mapelSelect.disabled = true;
      btnSubmit.disabled = true;

      if (!kelasTerpilih || !masterPaketAktif) return;

      let foundAny = false;

      Object.keys(masterPaketAktif).forEach(idPaket => {
        const paket = masterPaketAktif[idPaket];
        if (paket) {
          // UBAH OBJEK PAKET MENJADI STRING TEXT GLOBAL SECARA REAL-TIME
          const rawObjectText = JSON.stringify(paket).toUpperCase();
          
          // Definisikan berbagai skenario pencarian teks kelas murni
          const scanPattern1 = `KELAS ${kelasTerpilih}`;
          const scanPattern2 = `KELAS:${kelasTerpilih}`;
          const scanPattern3 = `"${kelasTerpilih}"`;
          const scanPattern4 = `:${kelasTerpilih}`;

          console.log(`[SCANNING] Paket: ${idPaket} | Mencari Target Angka: "${kelasTerpilih}"`);

          // JIKA STRING OBJEK MENGANDUNG TARGET ANGKA ATAU PATTERN DI ATAS, AKAN LANGSUNG LOLOS SINKRONISASI!
          if (
            rawObjectText.includes(scanPattern1) || 
            rawObjectText.includes(scanPattern2) || 
            rawObjectText.includes(scanPattern3) ||
            rawObjectText.includes(scanPattern4) ||
            rawObjectText.includes(`KELAS ${teksOpsiTerpilih.toUpperCase()}`)
          ) {
            let namaMapelMurni = "";
            let namaPaketMurni = "";

            if (paket.konfigurasi) {
              namaMapelMurni = paket.konfigurasi.mapel || paket.konfigurasi.mata_pelajaran || "";
              namaPaketMurni = paket.konfigurasi.nama_paket || "";
            }
            
            if (!namaMapelMurni) namaMapelMurni = paket.mapel || "";
            if (!namaPaketMurni) namaPaketMurni = paket.nama_paket || "";

            const mapelLabel = namaMapelMurni ? String(namaMapelMurni).toUpperCase() : "UJIAN AKTIF";
            const paketLabel = namaPaketMurni ? ` - ${namaPaketMurni}` : "";
            const textOpsiTampilan = `${mapelLabel}${paketLabel}`;

            mapelSelect.innerHTML += `<option value="${idPaket}">${textOpsiTampilan}</option>`;
            foundAny = true;
          }
        }
      });

      if (foundAny) {
        mapelSelect.disabled = false;
        btnSubmit.disabled = false;
      } else {
        alert("Tidak ada paket ujian aktif untuk " + teksOpsiTerpilih + " saat ini.");
      }
    }

    // LISTENER 1: SUBMIT LOGIN SISWA
    document.getElementById('studentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nama = document.getElementById('siswaNama').value.trim();
      const kelas = document.getElementById('siswaKelas').value;
      const idUjian = document.getElementById('siswaMapel').value;

      if (typeof AUTH_SERVICE !== 'undefined') {
        AUTH_SERVICE.studentDirectLogin(nama, kelas);
      }
      window.location.href = `siswa-exam.html?id_ujian=${idUjian}`;
    });

    // LISTENER 2: SUBMIT LOGIN ADMIN / STAFF
    document.getElementById('staffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userEl = document.getElementById('username');
      const passEl = document.getElementById('password');
      const btnEl = document.getElementById('btnSubmitStaff');
      const btnText = document.getElementById('btnTextStaff');
      const alertEl = document.getElementById('errorAlert');
      const alertText = document.getElementById('errorText');

      btnEl.disabled = true;
      btnText.innerText = "Memproses...";
      alertEl.classList.add('hidden');

      try {
        if (typeof AUTH_SERVICE === 'undefined') {
          throw new Error("Sistem otentikasi belum siap di browser. Muat ulang halaman.");
        }

        const res = await AUTH_SERVICE.login(userEl.value, passEl.value);

        if (res.success) {
          window.location.href = 'index.html';
        } else {
          alertText.innerText = res.message || "Gagal masuk. Periksa kembali username dan password Anda.";
          alertEl.classList.remove('hidden');
          btnEl.disabled = false;
          btnText.innerText = "Masuk Aplikasi Dashboard";
        }
      } catch (err) {
        console.error("Login Admin Error:", err);
        alertText.innerText = err.message;
        alertEl.classList.remove('hidden');
        btnEl.disabled = false;
        btnText.innerText = "Masuk Aplikasi Dashboard";
      }
    });

    window.onload = loadActivePackagesFromFirebase;
  </script>
</body>
</html>
