<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-slate-100">
    <!-- Header Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-600 text-white text-2xl font-bold mb-3">
        CBT
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Selamat Datang</h2>
      <p class="text-slate-500 text-sm mt-1">Silakan login dengan akun sekolah lu</p>
    </div>

    <!-- Alert Error Banner -->
    <div id="errorAlert" class="hidden mb-4 p-4 text-sm text-red-700 bg-red-50 rounded-lg border border-red-100 break-all" role="alert">
      <span class="font-medium">Waduh!</span> <span id="errorText"></span>
    </div>

    <!-- Form Login -->
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block mb-2 text-sm font-medium text-slate-700">Username</label>
        <input type="text" id="username" required autocomplete="username"
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all">
      </div>

      <div>
        <label class="block mb-2 text-sm font-medium text-slate-700">Password</label>
        <input type="password" id="password" required autocomplete="current-password"
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-slate-800 transition-all">
      </div>

      <button type="submit" id="btnSubmit"
        class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-100">
        <span id="btnText">Masuk Aplikasi</span>
      </button>
    </form>
  </div>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxE_OIRpPdaAR91bwa3fT8myIKytHZF8P0_PH5ikF-9fqjAJqoi4NaLpKdHtn7o9V5zEA/exec';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const userEl = document.getElementById('username');
      const passEl = document.getElementById('password');
      const btnEl = document.getElementById('btnSubmit');
      const btnText = document.getElementById('btnText');
      const alertEl = document.getElementById('errorAlert');
      const alertText = document.getElementById('errorText');

      btnEl.disabled = true;
      btnText.innerText = "Memproses...";
      alertEl.classList.add('hidden');

      try {
        const passwordHash = await sha256(passEl.value);

        // Kirim string asli tanpa toLowerCase() untuk melihat kecocokan dengan data Sheets
        const payload = {
          action: "login",
          payload: {
            username: userEl.value.trim(),
            password_hash: passwordHash
          }
        };

        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Gagal terhubung ke server backend!");
        const result = await response.json();

        if (result.status === "SUCCESS") {
          localStorage.setItem('cbt_session', JSON.stringify(result.data));
          const role = result.data.role.toUpperCase();
          if (role === 'ADMIN' || role === 'GURU' || role === 'OPERATOR') {
            window.location.href = 'index.html';
          } else {
            window.location.href = 'siswa-exam-list.html';
          }
        } else {
          // Tampilkan debug info apa hash yang dihasilkan oleh browser lu saat ini
          throw new Error(`${result.error} (Hash Input: ${passwordHash})`);
        }
      } catch (error) {
        alertText.innerText = error.message;
        alertEl.classList.remove('hidden');
      } finally {
        btnEl.disabled = false;
        btnText.innerText = "Masuk Aplikasi";
      }
    });
  </script>
</body>
</html>
