<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Soal | CBT-SAAS-GAS-GH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans flex min-h-screen">

  <main class="flex-1 p-8 max-w-5xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <a href="bank-soal.html" class="text-slate-400 hover:text-slate-600 text-lg">⬅️</a>
      <h1 class="text-2xl font-bold text-slate-800">Buat Soal Baru</h1>
    </div>

    <form id="soalForm" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- KIRI: Konten Utama Soal & Opsi -->
      <div class="lg:col-span-2 space-y-5">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
          <label class="block mb-2 text-sm font-medium text-slate-700">Isi / Teks Soal</label>
          <textarea id="konten_soal" rows="5" required placeholder="Tuliskan pertanyaan ujian di sini..."
            class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm"></textarea>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-4">
          <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-2">Pilihan Ganda</h3>
          
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500">A</span>
            <input type="text" id="opsi_a" required class="flex-1 px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500">B</span>
            <input type="text" id="opsi_b" required class="flex-1 px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500">C</span>
            <input type="text" id="opsi_c" required class="flex-1 px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500">D</span>
            <input type="text" id="opsi_d" required class="flex-1 px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
          <label class="block mb-2 text-sm font-medium text-slate-700">Pembahasan Soal (Opsional)</label>
          <textarea id="pembahasan" rows="3" placeholder="Tulis penjelasan jawaban di sini..."
            class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm"></textarea>
        </div>
      </div>

      <!-- KANAN: Meta Data & Aksi -->
      <div class="space-y-5">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-4">
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Mata Pelajaran</label>
            <input type="text" id="mapel" required placeholder="Contoh: Matematika" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Kelas</label>
            <input type="text" id="kelas" required placeholder="Contoh: X-IPA" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Semester</label>
            <input type="number" id="semester" required min="1" max="2" value="1" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Kunci Jawaban</label>
            <select id="kunci_jawaban" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block mb-1 text-xs font-medium text-slate-500">Kesulitan</label>
              <select id="tingkat_kesulitan" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="MUDAH">Mudah</option>
                <option value="SEDANG">Sedang</option>
                <option value="SULIT">Sulit</option>
              </select>
            </div>
            <div>
              <label class="block mb-1 text-xs font-medium text-slate-500">Bobot Skor</label>
              <input type="number" id="bobot" value="1" min="1" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>
        </div>

        <button type="submit" id="btnSimpan"
          class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-indigo-100 text-center block">
          Simpan Soal Ke Sheets
        </button>
      </div>
    </form>
  </main>

  <script src="auth-service.js"></script>
  <script>
    AUTH_SERVICE.checkSession(['ADMIN', 'GURU']);

    document.getElementById('soalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan');
      btn.disabled = true;
      btn.innerText = "Menyimpan...";

      const payload = {
        action: "saveSoal",
        payload: {
          mapel: document.getElementById('mapel').value.trim(),
          kelas: document.getElementById('kelas').value.trim(),
          semester: parseInt(document.getElementById('semester').value),
          tingkat_kesulitan: document.getElementById('tingkat_kesulitan').value,
          bobot: parseFloat(document.getElementById('bobot').value),
          konten_soal: document.getElementById('konten_soal').value.trim(),
          opsi_a: document.getElementById('opsi_a').value.trim(),
          opsi_b: document.getElementById('opsi_b').value.trim(),
          opsi_c: document.getElementById('opsi_c').value.trim(),
          opsi_d: document.getElementById('opsi_d').value.trim(),
          kunci_jawaban: document.getElementById('kunci_jawaban').value,
          pembahasan: document.getElementById('pembahasan').value.trim()
        }
      };

      try {
        const res = await fetch(AUTH_SERVICE.GAS_API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        
        if (result.status === "SUCCESS") {
          alert("Mantap! Soal berhasil disimpan ke Google Sheets.");
          window.location.href = "bank-soal.html";
        } else {
          alert("Gagal: " + result.error);
          btn.disabled = false;
          btn.innerText = "Simpan Soal Ke Sheets";
        }
      } catch (err) {
        alert("Terjadi gangguan koneksi ke server!");
        btn.disabled = false;
        btn.innerText = "Simpan Soal Ke Sheets";
      }
    });
  </script>
</body>
</html>
